<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Únete al Fandom</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%' y='50%' text-anchor='middle' dominant-baseline='central' font-size='80'>🍄</text></svg>"
    />
    <style>
        :root {
            --bg: #0d0e11;
            --surface: rgba(28, 30, 34, 0.95);
            --text: #f3f3f3;
            --accent: #e04d3f;
            --muted: #b5b5b5;
            --border: rgba(255, 255, 255, 0.13);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 0, #333 0%, #0a0b0f 55%, #07080c 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }

        header, main, footer {
            max-width: 980px;
            margin: 0 auto;
            padding: 0.9rem 1rem;
        }

        header {
            text-align: center;
        }

        header h1 {
            margin: 1rem 0;
            color: var(--accent);
            font-size: clamp(2rem, 4vw, 2.8rem);
            text-shadow: 0 0 12px rgba(224, 77, 63, 0.6);
        }

        .hero-image {
            width: 100%;
            max-width: 100%;
            margin: 1rem auto;
            border-radius: 12px;
            object-fit: cover;
            max-height: 320px;
        }

        main {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem 1rem;
            margin-top: 1rem;
        }

        main h2 {
            text-align: center;
            margin-top: 0;
            font-size: 1.8rem;
        }

        main p {
            text-align: center;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .form-fandom {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-fandom input,
        .form-fandom textarea {
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1b1d21;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
        }

        .form-fandom input::placeholder,
        .form-fandom textarea::placeholder {
            color: var(--muted);
        }

        .form-fandom button {
            padding: 0.85rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .form-fandom button:hover {
            background: #c6392d;
        }

        footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
        }

        a.back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        a.back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>Únete al Fandom</h1>
    </header>

    <img src="assetsT/img008.jpg" alt="Fandom The Last of Us" class="hero-image">

    <main>
        <h2>Comparte tu pasión</h2>
        <p>Cuéntanos por qué amas The Last of Us y sé parte de nuestra comunidad</p>
        
        <form class="form-fandom">
            <div>
                <label for="nombre">NOMBRE</label>
                <input type="text" id="nombre" required>
            </div>
            <br>
            <div>
                <label for="apellidos">APELLIDOS</label>
                <input type="text" id="apellidos" required>
            </div>
            <br>
            <div>
                <label for="email">EMAIL</label>
                <input type="email" id="email" required>
            </div>
            <br>
            <div>
                <label for="mensaje">MENSAJE</label>
                <input type="text" id="mensaje">
            </div>
            <br>
            <button type="submit">ENVIAR SOLICITUD</button>
        </form>

        <a href="index001.html" class="back-link">← Volver a The Last of Us</a>
    </main>

    <footer>
        <p>&copy; 2026 The Last of Us Fandom. Todos los derechos reservados.</p>   
    </footer>
</body>
</html>
