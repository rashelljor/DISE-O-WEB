<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Hola Mundo</h1> 
    </header>
    <main>
        <p>Bienvenidos a la clase de Diseño Web</p>
        <section>
        <h3>Formulario Actualizar</h3>
        <form id="formularioActualizar">
            <div>
                <label for="pos">Posición</label><br><br>
                <input type="number" id="pos"><br><br>
            </div>
            <div>
                <label for="nombre">Nombre</label><br><br>
                <input type="text" id="nombre"><br><br>
            </div>
            <div>
                <label for="edad">Edad</label><br><br>
                <input type="number" id="edad"><br><br>
            </div>
            <div>
                <label for="correo">Correo Elctrónico</label><br><br>
                <input type="email" id="correo"><br><br>
            </div>
            <button type="submit">Actualizar</button><br><br>
        </form>
        </section>
        <section>
        <h3>Formulario Eliminar</h3>
        <form id="formularioEliminar" action="index.html" method="POST">
            <label for="indice">Índice</label><br><br>
            <input type="number" id="indice"><br><br>
            <button type="submit">Eliminar</button><br><br>
        </form>
        </section>
    </main>
    <aside>
        <p>Este es un texto de ejemplo para el aside</p>
    </aside>
    <footer>
        <p>Copyright 2024</p>
    </footer>
    <script src="app02.js"></script>
</body>
</html>
